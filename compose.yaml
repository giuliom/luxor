services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: luxor
      POSTGRES_USER: luxor
      POSTGRES_PASSWORD: luxor
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - luxor-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luxor -d luxor"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - luxor-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.19.0
    profiles: ["observability"]
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${OTEL_GRPC_PORT:-4317}:4317"

volumes:
  luxor-postgres:
  luxor-redis:
